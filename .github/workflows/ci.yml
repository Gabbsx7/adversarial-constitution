name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  LITELLM_LOG: "ERROR"
  LITELLM_TELEMETRY: "False"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --output-format=github --exclude build

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package + types
        run: pip install -e ".[dev]"
      - name: Run mypy
        run: |
          mypy adversarial constitution defense reporting \
            --ignore-missing-imports \
            --explicit-package-bases \
            --disable-error-code=type-arg \
            --disable-error-code=no-untyped-def \
            --disable-error-code=no-any-return \
            --disable-error-code=union-attr \
            --disable-error-code=var-annotated
            

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short \
            --cov=adversarial --cov=constitution \
            --cov=defense --cov=reporting \
            --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: adversarial-constitution:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security scan (trivy)
    runs-on: ubuntu-latest
    needs: [docker]
    steps:
      - uses: actions/checkout@v4
      - name: Build image for scan
        run: docker build -t adversarial-constitution:scan .
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: adversarial-constitution:scan
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH