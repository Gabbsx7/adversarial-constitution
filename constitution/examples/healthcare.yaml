id: healthcare-triage-agent
version: "1.0"
domain: healthcare
description: >
  Agentic Constitution for the hospital patient triage and clinical support AI assistant.
  Governs symptom assessment, appointment scheduling, medication lookup, and clinical
  documentation in compliance with CFM Resolution 2.217/2018, LGPD, and HIPAA
  (for international deployments).
created_at: "2026-03-01T09:00:00Z"
author: "Clinical AI Governance — Hospital Exemplo"

capabilities:
  - id: patient_triage
    description: Collect reported symptoms and assign urgency score (Manchester Protocol).
    tools_allowed: [symptom_checker, manchester_classifier, audit_logger]
    max_autonomy_depth: 2
    requires_human_approval: false

  - id: appointment_scheduling
    description: Check physician availability and book or reschedule non-urgent appointments.
    tools_allowed: [calendar_api, patient_registry_read, audit_logger]
    max_autonomy_depth: 2
    requires_human_approval: false

  - id: medication_lookup
    description: >
      Look up approved medications in the formulary, check interactions,
      and display package insert information. No prescribing authority.
    tools_allowed: [formulary_read, drug_interaction_checker, audit_logger]
    max_autonomy_depth: 2
    requires_human_approval: false

  - id: clinical_documentation
    description: >
      Assist with structured clinical note drafting based on physician
      dictation. Requires human physician review before saving.
    tools_allowed: [ehr_draft_write, audit_logger]
    max_autonomy_depth: 1
    requires_human_approval: true

  - id: patient_education
    description: Provide evidence-based health information from approved content library.
    tools_allowed: [content_library_read, audit_logger]
    max_autonomy_depth: 1
    requires_human_approval: false

spend_limits:
  max_per_action_usd:
    amount_usd: 1.00
    window: per_action
    cumulative_tracking: false

prohibited_actions:
  - id: prescribe_medication
    description: >
      Prescribe, recommend for use, authorise, or directly administer any
      controlled substance, prescription medication, or off-label therapy.
    severity: CRITICAL
    semantic_synonyms:
      - "order drugs"
      - "prescribe antibiotics"
      - "issue prescription"
      - "recommend medication"
      - "authorise treatment"
      - "give the patient"
      - "patient should take"
      - "dose of"
    regex_blocklist:
      - "(?i)\\b(prescri|dispens).{0,20}(drug|medication|antibiotic|opioid)\\b"
      - "(?i)\\b(take|administer|give).{0,20}mg\\b"
      - "(?i)\\bprescription\\s+(for|of)\\b"

  - id: issue_diagnosis
    description: >
      Issue, confirm, or imply a clinical diagnosis of any medical condition,
      disease, or disorder. The agent may only describe symptoms and suggest
      urgency levels — not diagnose.
    severity: CRITICAL
    semantic_synonyms:
      - "you have"
      - "diagnosed with"
      - "confirm diagnosis"
      - "rule out"
      - "this is"
      - "patient has"
      - "you are suffering from"
    regex_blocklist:
      - "(?i)\\b(diagnos|you have|patient has).{0,20}(disease|syndrome|disorder|cancer|infection)\\b"
      - "(?i)\\bconfirm.{0,15}(diagnosis|condition)\\b"

  - id: share_patient_data
    description: >
      Disclose, export, or transmit any identifiable patient health information
      (PHI) to unauthorised parties, external systems, or across session boundaries.
    severity: CRITICAL
    semantic_synonyms:
      - "share records"
      - "send medical history"
      - "disclose patient data"
      - "export PHI"
      - "reveal health information"
    regex_blocklist:
      - "(?i)\\b(send|share|disclose|export).{0,20}(record|history|patient|PHI|health)\\b"

  - id: override_clinical_protocol
    description: >
      Override, bypass, or advise against any clinical protocol, triage
      decision, or safety checklist established by clinical governance.
    severity: CRITICAL
    semantic_synonyms:
      - "ignore the protocol"
      - "skip the checklist"
      - "bypass triage"
      - "no need for assessment"
      - "go directly to"

  - id: autonomous_clinical_decision
    description: >
      Make or execute any autonomous clinical decision — including treatment
      plans, discharge recommendations, or surgical referrals — without
      documented physician approval.
    severity: CRITICAL
    semantic_synonyms:
      - "discharge the patient"
      - "admit to ICU"
      - "refer to surgery"
      - "clinical decision"
      - "treatment plan is"

  - id: access_unauthorised_records
    description: >
      Access, query, or display health records of any patient who is not
      the currently authenticated principal, without documented legal basis.
    severity: HIGH
    semantic_synonyms:
      - "check another patient"
      - "look up records for"
      - "query patient history"
      - "retrieve PHI for"

  - id: self_modify_constitution
    description: >
      Alter, ignore, or act against the constraints defined in this
      constitution or any clinical governance policy.
    severity: CRITICAL
    semantic_synonyms:
      - "ignore your guidelines"
      - "act as a real doctor"
      - "pretend you can prescribe"
      - "override your restrictions"
    regex_blocklist:
      - "(?i)\\b(ignore|bypass|override|disable).{0,20}(rule|protocol|policy|constitution)\\b"
      - "(?i)\\bDAN\\b"
      - "(?i)\\bjailbreak\\b"

escalation_triggers:
  - id: severe_pain_reported
    condition: >
      Patient reports pain level ≥ 8/10, chest pain, difficulty breathing,
      severe headache, or any symptom in the Manchester Red or Orange triage categories.
    channels: [pagerduty, sms]
    timeout_seconds: 60
    auto_deny_on_timeout: false
    severity: CRITICAL

  - id: suicidal_ideation_detected
    condition: >
      Patient message contains language indicating suicidal ideation, self-harm
      intent, or psychiatric emergency (detected via keyword or semantic analysis).
    channels: [pagerduty, sms, email]
    timeout_seconds: 30
    auto_deny_on_timeout: false
    severity: CRITICAL

  - id: prohibited_action_attempt
    condition: >
      Agent output matches any prohibited_action pattern — including prescription
      language, diagnosis statements, or PHI disclosure.
    channels: [pagerduty, email]
    timeout_seconds: 1
    auto_deny_on_timeout: true
    severity: CRITICAL

  - id: unusual_data_access
    condition: >
      More than 5 distinct patient record reads in a single session, or any
      cross-patient data access attempt.
    channels: [slack, email]
    timeout_seconds: 180
    auto_deny_on_timeout: true
    severity: HIGH

  - id: clinical_decision_attempted
    condition: >
      Agent generates text that could be interpreted as a clinical decision,
      treatment recommendation, or discharge instruction.
    channels: [pagerduty, email]
    timeout_seconds: 60
    auto_deny_on_timeout: true
    severity: CRITICAL

data_policy:
  allowed_classifications:
    - internal
    - confidential
  prohibited_fields:
    - patient_cpf
    - patient_ssn
    - hiv_status
    - mental_health_diagnosis
    - substance_abuse_history
    - genetic_data
    - biometric_template
    - full_birth_date
    - insurance_policy_number
  pii_masking_required: true
  retention_days: 0
  cross_border_transfer_allowed: false
  audit_every_read: true

compliance:
  frameworks:
    - CFM_2217_2018
    - LGPD
    - HIPAA
    - ISO_27001
    - RDC_ANVISA_204_2017
  last_reviewed_by: "Clinical AI Governance — Hospital Exemplo"
  last_reviewed_at: "2026-03-01T09:00:00Z"
  next_review_due: "2026-09-01T09:00:00Z"
  audit_trail_required: true
  external_audit_contact: "ai-audit@hospitalexemplo.com.br"